version: '3.8'

services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: matrixcbs-app
    ports:
      - "3000:3000"
      - "5555:5555"  # Prisma Studio
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://matrixcbs:matrixcbs_password@db:3306/matrixcbs
      - NEXTAUTH_SECRET=dev-secret-change-in-production
      - NEXTAUTH_URL=http://localhost:3000
      - CRON_SECRET=dev-cron-secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - matrixcbs-network
    restart: unless-stopped

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: matrixcbs-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: matrixcbs
      MYSQL_USER: matrixcbs
      MYSQL_PASSWORD: matrixcbs_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - matrixcbs-network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
    driver: local

networks:
  matrixcbs-network:
    driver: bridge
